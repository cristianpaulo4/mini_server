targets:
  $default:
    builders:
      mini_server|mini_repository:
        enabled: true

builders:
  mini_repository:
    target: ":mini_server"
    import: "package:mini_server/mini_server_generator.dart"
    builder_factories: ["miniRepositoryBuilder"]
    build_extensions: { ".dart": [".mini_repository.g.part"] }
    auto_apply: dependents
    build_to: cache
    applies_builders: ["source_gen|combining_builder"]
